<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're Offline – MovieReview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #141414;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .icon { font-size: 5rem; margin-bottom: 1.5rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.75rem; }
    h1 span { color: #e50914; }
    p { color: #888; font-size: 1rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #e50914;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #ff1a1a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎬</div>
    <h1>You're <span>Offline</span></h1>
    <p>
      It looks like you've lost your internet connection.
      Don't worry — your cached movies and favorites are still available.
    </p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
