<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />

    <!-- SEO -->
    <title>MovieReview – Discover, Review &amp; Track Films</title>
    <meta name="description" content="Browse trending, top-rated and upcoming movies. Read and write reviews, build your watchlist, and get personalised recommendations." />
    <meta name="keywords" content="movies, film reviews, watchlist, recommendations, TMDB" />
    <meta name="author" content="MovieReview" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MovieReview – Discover, Review &amp; Track Films" />
    <meta property="og:description" content="Your ultimate movie companion. Trending, top-rated, and personalised picks." />
    <meta property="og:image" content="%PUBLIC_URL%/icons/icon-512.png" />
    <meta property="og:url" content="https://movie-review-system.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MovieReview" />
    <meta name="twitter:description" content="Your ultimate movie companion." />

    <!-- PWA -->
    <meta name="theme-color" content="#e50914" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MovieReview" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run MovieReview.</noscript>
    <div id="root"></div>
  </body>
</html>
